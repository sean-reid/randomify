version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    target-branch: dev
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: dev
    commit-message:
      prefix: ci(deps)
    groups:
      actions:
        patterns: ['*']
