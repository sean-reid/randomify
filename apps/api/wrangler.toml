name = "randomify-api-dev"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# The default (top-level) environment is the deployed dev API, used by PR
# previews and the stable randomify-dev domain. Local `wrangler dev` ignores
# routes.
routes = [{ pattern = "api.dev.randomify.net", custom_domain = true }]

# The corpus lives in Neon Postgres, reached from the Worker through Hyperdrive.
# Each environment points at its own Neon branch via its own Hyperdrive config.
# The Worker falls back to the demo corpus when the binding is absent.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "b3a5910cfb044a3d99060c7784a40baf"

# Per-request telemetry (failure modes + spin/preview counts). Non-inheritable,
# so declared per environment with its own dataset.
[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "randomify_api_dev"

# Coalescing alert Durable Object (failure-mode ntfy pushes). Bound + migrated
# per environment because named envs do not inherit top-level config.
[[durable_objects.bindings]]
name = "ALERTS"
class_name = "AlertCoalescer"

[[migrations]]
tag = "v1"
new_classes = ["AlertCoalescer"]

[env.staging]
name = "randomify-api-staging"
routes = [{ pattern = "api.staging.randomify.net", custom_domain = true }]
[[env.staging.hyperdrive]]
binding = "HYPERDRIVE"
id = "75213f4579c34270ac23cee10aed26e2"
[[env.staging.analytics_engine_datasets]]
binding = "METRICS"
dataset = "randomify_api_staging"
[[env.staging.durable_objects.bindings]]
name = "ALERTS"
class_name = "AlertCoalescer"
[[env.staging.migrations]]
tag = "v1"
new_classes = ["AlertCoalescer"]

[env.production]
name = "randomify-api-production"
routes = [{ pattern = "api.randomify.net", custom_domain = true }]
[[env.production.hyperdrive]]
binding = "HYPERDRIVE"
id = "09e9b966476548d89c9f977a99aeb7a0"
[[env.production.analytics_engine_datasets]]
binding = "METRICS"
dataset = "randomify_api_production"
[[env.production.durable_objects.bindings]]
name = "ALERTS"
class_name = "AlertCoalescer"
[[env.production.migrations]]
tag = "v1"
new_classes = ["AlertCoalescer"]
